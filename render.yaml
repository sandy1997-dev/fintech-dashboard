services:
  - type: web
    name: fintech-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fintech-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false   # Set to your Vercel URL

databases:
  - name: fintech-db
    databaseName: fintech_db
    user: fintech_user
    plan: free
